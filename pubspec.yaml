name: bajaj_finserv_demo
description: A simplified Flutter demo app replicating Bajaj Finserv mobile app structure for learning purposes.

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # For date formatting in EMI card widget
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # If you want to add custom assets later, uncomment and configure:
  # assets:
  #   - assets/images/
  #   - assets/icons/
